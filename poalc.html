<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Partnership & Offering | Ambiance of Life Church</title>

  <style>
    :root {
      --primary: #0d1b2a;
      --accent: #e63946;
      --light: #ffffff;
      --text: #333;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: var(--light);
      color: var(--text);
      overflow-x: hidden;
    }

    header {
      background: var(--primary);
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    .hero {
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7));
      color: white;
      text-align: center;
      padding: 60px 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 30px 20px;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    h2 {
      color: var(--primary);
      margin-bottom: 10px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      font-weight: 600;
      display: block;
      margin-bottom: 5px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    textarea {
      min-height: 100px;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      outline: none;
    }

    .btn {
      background: var(--accent);
      color: white;
      padding: 14px;
      border: none;
      width: 100%;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .payment-options {
      display: none;
      margin-top: 15px;
    }

    .payment-box {
      background: #f1f1f1;
      padding: 15px;
      border-radius: 8px;
      margin-top: 10px;
    }

    .success {
      display: none;
      text-align: center;
      color: green;
      margin-top: 15px;
      font-weight: bold;
    }

    footer {
      background: var(--primary);
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 30px;
    }
    a {

      color: #c56912;
      text-decoration: none;
      
    }

    
    @media(max-width: 768px) {
      .menu {
        position: absolute;
        top: 60px;
        left: 0;
        width: 100%;
        background: var(--primary);
        flex-direction: column;
        align-items: center;
        display: none;
      }
      .container {
        width: 90%;
      }
      .hero{
        display: none;
      }
    }

  </style>
</head>

<body>

<header>Ambiance of Life Church  <nav>
    <a href="index.html">Home</a>
   <a href="music.html">Media</a>
   </nav>
  
  
  </nav>
</header>

<section class="container">

  <div class="card">
    <h2>Submit Your Offering</h2>

    <form id="form">

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" required>
      </div>

      <div class="form-group">
        <label>Phone</label>
        <input type="tel" id="phone" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required>
      </div>

      <div class="form-group">
        <label>Offering Type</label>
        <select id="type">
          <option>Tithe</option>
          <option>Seed</option>
          <option>Partnership</option>
          <option>Special Offering</option>
        </select>
      </div>

      <div class="form-group">
        <label>Amount (ZMW)</label>
        <input type="number" id="amount" required>
      </div>

      <div class="form-group">
        <label>Payment Method</label>
        <select id="payment" onchange="showPayment()">
          <option value="">Select Method</option>
          <option value="mtn">MTN Mobile Money</option>
          <option value="airtel">Airtel Money</option>
          <option value="card">Bank Card</option>
        </select>
      </div>

      <div class="payment-options" id="paymentOptions"></div>

      <div class="form-group">
        <label>Message</label>
        <textarea id="message"></textarea>
      </div>

      <button class="btn" type="submit">Complete Submission</button>

      <div class="success" id="successMsg">
        Submission successful! You will receive confirmation shortly.
      </div>

    </form>
  </div>

</section>

<footer>
  © 2026 Ambiance of Life Church
</footer>

<script>
function showPayment(){
  const method = document.getElementById("payment").value;
  const box = document.getElementById("paymentOptions");

  box.style.display = "block";

  if(method === "mtn"){
   /* box.innerHTML = `
      <div class="payment-box">
        <b>MTN Mobile Money</b><br>
        Send to: <b>+260 973811820</b><br>
       Name: Mahongo Kaswilo.
      </div>`;*/
  }

  else if(method === "airtel"){
    box.innerHTML = `
      <div class="payment-box">
        <b>Airtel Money</b><br>
     Send to: <b>+260 973811820</b><br>
       Name: Mahongo Kaswilo
      </div>`;
  }

  else if(method === "card"){
    box.innerHTML = `
      <div class="payment-box">
        <b>Bank Card</b><br>
        (Integration ready – connect Paystack/Flutterwave)
      </div>`;
  }
}

// WhatsApp + receipt + success
const form = document.getElementById("form");
form.addEventListener("submit", function(e){
  e.preventDefault();

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const email = document.getElementById("email").value;
  const amount = document.getElementById("amount").value;
  const type = document.getElementById("type").value;

  // WhatsApp message
  const msg = `New Offering:%0AName: ${name}%0APhone: ${phone}%0AEmail: ${email}%0AType: ${type}%0AAmount: ZMW ${amount}`;
  window.open(`https://wa.me/260976564595?text=${msg}`);

  // Download receipt
  const receipt = `
  RECEIPT\n\nName: ${name}\nPhone: ${phone}\nEmail: ${email}\nType: ${type}\nAmount: ZMW ${amount}\n\nThank you for your giving!`;

  const blob = new Blob([receipt], {type: "text/plain"});
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "receipt.txt";
  link.click();

  document.getElementById("successMsg").style.display = "block";
  form.reset();
});
</script>

</body>
</html>
