<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Partnership & Offering | Ambiance of Life Church</title>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root {
  --primary: #0d1b2a;
  --accent: #e63946;
  --light: #ffffff;
  --text: #333;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  background: var(--light);
  color: var(--text);
}

header {
  background: var(--primary);
  color: white;
  padding: 15px;
  text-align: center;
}

header nav a {
  color: #f4a261;
  margin: 0 10px;
  text-decoration: none;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 30px 20px;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

h2 {
  color: var(--primary);
  margin-bottom: 15px;
}

.form-group {
  margin-bottom: 15px;
}

label {
  font-weight: 600;
  display: block;
  margin-bottom: 5px;
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

textarea { min-height: 100px; }

.btn {
  background: var(--accent);
  color: white;
  padding: 14px;
  border: none;
  width: 100%;
  border-radius: 8px;
  cursor: pointer;
}

.success {
  display: none;
  text-align: center;
  color: green;
  margin-top: 15px;
  font-weight: bold;
}

footer {
  background: var(--primary);
  color: white;
  text-align: center;
  padding: 20px;
  margin-top: 30px;
}

@media(max-width:768px){
  .container { width: 95%; }
}
</style>
</head>

<body>

<header>
  Ambiance of Life Church
  <nav>
    <a href="index.html">Home</a>
    <a href="music.html">Media</a>
  </nav>
</header>

<section class="container">
<div class="card">
<h2>Submit Your Offering</h2>

<form id="form">

<div class="form-group">
<label>Full Name</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>Phone</label>
<input type="tel" id="phone" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email" required>
</div>

<div class="form-group">
<label>Offering Type</label>
<select id="type">
<option>Tithe</option>
<option>Seed</option>
<option>Partnership</option>
<option>Special Offering</option>
</select>
</div>

<div class="form-group">
<label>Amount (ZMW)</label>
<input type="number" id="amount" min="5" required>
</div>

<div class="form-group">
<label>Message</label>
<textarea id="message"></textarea>
</div>

<button class="btn" type="submit">Complete Submission</button>

<div class="success" id="successMsg">
Submission successful! Receipt downloaded.
</div>

</form>
</div>
</section>

<footer>© 2026 Ambiance of Life Church</footer>

<script>
const { jsPDF } = window.jspdf;

const form = document.getElementById("form");

form.addEventListener("submit", function(e){
  e.preventDefault();

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const email = document.getElementById("email").value;
  const amount = document.getElementById("amount").value;
  const type = document.getElementById("type").value;

  // ===== WhatsApp =====
  const msg = `New Offering:%0AName: ${name}%0APhone: ${phone}%0AEmail: ${email}%0AType: ${type}%0AAmount: ZMW ${amount}`;
  window.open(`https://wa.me/260976564595?text=${msg}`);

  // ===== PDF RECEIPT =====
  const doc = new jsPDF();

  // Header
  doc.setFontSize(16);
  doc.setFont("helvetica","bold");
  doc.text("Ambiance of Life Church", 200, 20, {align:"right"});

  doc.setFontSize(10);
  doc.setFont("helvetica","normal");
  doc.text("Lusaka, Zambia", 200, 26, {align:"right"});

  // Title
  doc.setFontSize(18);
  doc.text("RECEIPT", 105, 50, {align:"center"});

  doc.line(14,55,196,55);

  // Customer Info
  doc.setFontSize(12);
  doc.text(`Name: ${name}`, 14, 70);
  doc.text(`Phone: ${phone}`, 14, 80);
  doc.text(`Email: ${email}`, 14, 90);

  // Box
  doc.setFillColor(240,240,240);
  doc.rect(14, 100, 182, 40, "F");

  doc.setFont("helvetica","bold");
  doc.text("Payment Details", 16, 110);

  doc.setFont("helvetica","normal");
  doc.text(`Type: ${type}`, 16, 120);
  doc.text(`Amount: ZMW ${amount}`, 16, 130);

  // Total
  doc.setFont("helvetica","bold");
  doc.setFontSize(14);
  doc.text(`TOTAL: ZMW ${amount}`, 196, 150, {align:"right"});

  // Footer
  doc.setFontSize(10);
  doc.setFont("helvetica","italic");
  doc.text("Thank you for your giving!", 105, 170, {align:"center"});

  // Save
  doc.save("receipt.pdf");

  // UI feedback
  document.getElementById("successMsg").style.display = "block";
  form.reset();
});
</script>

</body>
</html>
