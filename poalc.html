<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Partnership & Offering | Ambiance of Life Church</title>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root {
  --primary: #0d1b2a;
  --accent: #e63946;
  --light: #ffffff;
  --text: #333;
  --error:red;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  background: var(--light);
  color: var(--text);
}

header {
  background: var(--primary);
  color: white;
  padding: 15px;
  text-align: center;
}

header nav a {
  color: #f4a261;
  margin: 0 10px;
  text-decoration: none;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 30px 20px;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

h2 {
  color: var(--primary);
  margin-bottom: 15px;
}

.form-group {
  margin-bottom: 15px;
}

label {
  font-weight: 600;
  display: block;
  margin-bottom: 5px;
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

textarea {
  resize: none; /* removes the resize handle */
  width: 100%;
  height: 120px;
}

.btn {
  background: var(--accent);
  color: white;
  padding: 14px;
  border: none;
  width: 100%;
  border-radius: 8px;
  cursor: pointer;
}

.success {
  display: none;
  text-align: center;
  color: green;
  margin-top: 15px;
  font-weight: bold;
}

footer {
  background: var(--primary);
  color: white;
  text-align: center;
  padding: 20px;
  margin-top: 30px;
}
.error {
  color: var(--error);
}
@media(max-width:768px){
  .container { width: 100%;
  padding: 2px;
  margin-top: 60px;
  
  }
  header {
    position: fixed;
    width: 100%;
    top: 0;
    left: 0;
    opacity: 0.7;
  }

  footer {
    position: relative;
    width: 100%;
    bottom:60;
    left: 0;
  }
 .textarea {
  resize: none;
  max-width:100%;
 }
}


</style>
</head>

<body>

<header>
  Ambiance of Life Church
  <nav>
    <a href="index.html">Home</a>
    <a href="music.html">Media</a>
  </nav>
</header>

<section class="container">

  <div class="card">
    <h2>Submit Your Offering</h2>

    <form id="form">

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" required>
      </div>

      <div class="form-group">
        <label>Phone</label>
        <input type="tel" id="phone" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required>
      </div>

      <div class="form-group">
        <label>Giving Category</label>
        <select id="type">
          <option>Tithe</option>
           <option>Offering</option>
          <option>Seed</option>
           <option>Church Rentals</option>
           <option>Instruments</option>
           <option>Buiding Project</option>
          <option>Partnership</option>
           <option>Mission Work</option>
        </select>
      </div>

      <div class="form-group">
        <label>Amount (ZMW)</label>
        <input type="number" id="amount" min=5 required>
      </div>

      <div class="form-group">
        <label>Payment Method</label>
        <select id="payment" onchange="showPayment()">
          <option value="">Select Method</option>
          <option value="mtn">MTN Mobile Money</option>
          <option value="airtel">Airtel Money</option>
          <option value="card">Bank Card</option>
        </select>
      </div>

      <div class="payment-options" id="paymentOptions"></div>

      <div class="form-group">
        <label>Message</label>
        <textarea id="message"></textarea>
      </div>

      <button class="btn" type="submit">Complete Submission</button>

      <div class="success" id="successMsg">
        Submission successful! You will receive confirmation shortly.
      </div>

    </form>
  </div>

</section>
<footer>© 2026 Ambiance of Life Church</footer>

<script>
const { jsPDF } = window.jspdf;

const form = document.getElementById("form");

form.addEventListener("submit", function(e){
  e.preventDefault();

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const email = document.getElementById("email").value;
  const amount = document.getElementById("amount").value;
  const type = document.getElementById("type").value;

  // ===== WhatsApp =====
  const msg = `New Offering:%0AName: ${name}%0APhone: ${phone}%0AEmail: ${email}%0AType: ${type}%0AAmount: ZMW ${amount}`;
  window.open(`https://wa.me/260976564595?text=${msg}`);

  // ===== PDF RECEIPT =====
  const doc = new jsPDF();

  // Header
  doc.setFontSize(16);
  doc.setFont("helvetica","bold");
  doc.text("Ambiance of Life Church", 200, 20, {align:"right"});

  doc.setFontSize(10);
  doc.setFont("helvetica","normal");
  doc.text("Lusaka, Zambia", 200, 26, {align:"right"});

  // Title
  doc.setFontSize(18);
  doc.text("RECEIPT", 105, 50, {align:"center"});

  doc.line(14,55,196,55);

  // Customer Info
  doc.setFontSize(12);
  doc.text(`Name: ${name}`, 14, 70);
  doc.text(`Phone: ${phone}`, 14, 80);
  doc.text(`Email: ${email}`, 14, 90);

  // Box
  doc.setFillColor(240,240,240);
  doc.rect(14, 100, 182, 40, "F");

  doc.setFont("helvetica","bold");
  doc.text("Payment Details", 16, 110);

  doc.setFont("helvetica","normal");
  doc.text(`Type: ${type}`, 16, 120);
  doc.text(`Amount: ZMW ${amount}`, 16, 130);

  // Total
  doc.setFont("helvetica","bold");
  doc.setFontSize(14);
  doc.text(`TOTAL: ZMW ${amount}`, 196, 150, {align:"right"});

  // Footer
  doc.setFontSize(10);
  doc.setFont("helvetica","italic");
  doc.text("Thank you for your giving!", 105, 170, {align:"center"});

  // Save
  doc.save("receipt.pdf");

  // UI feedback
  document.getElementById("successMsg").style.display = "block";
  form.reset();
});

  function showPayment(){
  const method = document.getElementById("payment").value;
  const box = document.getElementById("paymentOptions");

  box.style.display = "block";

  if(method === "mtn"){
    box.innerHTML = `
      <div class="payment-box">
        <b>MTN Mobile Money</b><br>
        Send to: <b>+260 968 136 232</b><br>
       Name: Reuben Lubumba
      </div>`;
  }

  else if(method === "airtel"){
    box.innerHTML = `
      <div class="payment-box">
        <b>Airtel Money</b><br>
        Send to: <b>+260 973811820</b><br>
        Name: Mahongo Kaswilo.
      </div>`;
  }

  else if(method === "card"){
    box.innerHTML = `
      <div class="payment-box">
        <b>Bank Card</b><br>
        <div class="error"> Service not available <br> At the moment</div>
      </div>`;
  }
}

</script>

</body>
</html>
