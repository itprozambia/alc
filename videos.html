<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALC Video Library</title>

<style>
:root {
  --primary: #0d1b2a;
  --accent: #e63946;
  --light: #f8f9fa;
  --text: #333;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

/* HEADER */
header {
  background: var(--primary);
  color: white;
  padding: 12px 20px;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-weight: bold;
}

.search-bar {
  flex: 1;
  max-width: 500px;
  margin: 0 20px;
}

.search-bar input {
  width: 100%;
  padding: 10px;
  border-radius: 20px;
  border: none;
}

/* LAYOUT */
.container {
  display: flex;
}

/* SIDEBAR MENU */
.sidebar-menu {
  width: 200px;
  background: #fff;
  padding: 20px;
  border-right: 1px solid #ddd;
}

.sidebar-menu a {
  display: block;
  margin-bottom: 15px;
  text-decoration: none;
  color: var(--text);
}

/* MAIN CONTENT */
.main {
  flex: 1;
  padding: 20px;
}

/* VIDEO PLAYER */
.player {
  width: 100%;
  margin-bottom: 20px;
}

.player video {
  width: 100%;
  border-radius: 10px;
}

/* GRID */
.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 15px;
}

/* VIDEO CARD */
.video-card {
  cursor: pointer;
  transition: 0.3s;
}

.video-card:hover {
  transform: scale(1.03);
}

.video-card video {
  width: 100%;
  border-radius: 8px;
}

.video-info {
  padding: 5px;
}

.video-info h4 {
  font-size: 14px;
}

.video-info p {
  font-size: 12px;
  color: gray;
}

/* MOBILE */
@media(max-width:768px){
  .container {
    flex-direction: column;
  }

  .sidebar-menu {
    width: 100%;
    display: flex;
    justify-content: space-around;
    border-right: none;
    border-bottom: 1px solid #ddd;
  }

  .search-bar {
    display: none;
  }
}
</style>
</head>

<body>

<header>
  <div class="nav">
    <div class="logo">ALC Videos</div>
    <div class="search-bar">
      <input type="text" id="search" placeholder="Search..." onkeyup="searchVideos()">
    </div>
  </div>
</header>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar-menu">
    <a href="#">Home</a>
    <a href="#">Sermons</a>
    <a href="#">Music</a>
    <a href="#">Contact</a>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- PLAYER -->
    <div class="player">
      <video id="mainVideo" controls>
        <source id="videoSource" src="Videos/This_Victoria_Orenze.mp4" type="video/mp4">
      </video>
      <h2 id="title">Sunday Service</h2>
      <p id="desc">Experience God's presence</p>
    </div>

    <!-- GRID -->
    <div class="video-grid" id="videoGrid">

      <div class="video-card"
        onclick="playVideo('Victoria Orenze','This Year','Videos/This_Victoria_Orenze.mp4')">
        <video src="Videos/This_Victoria_Orenze.mp4"></video>
        <div class="video-info">
          <h4>Victoria Orenze</h4>
          <p>This Year</p>
        </div>
      </div>

      <div class="video-card"
        onclick="playVideo('House Of David','Goliath Dies','Videos/GOLIATH.mp4')">
        <video src="Videos/GOLIATH.mp4"></video>
        <div class="video-info">
          <h4>House Of David</h4>
          <p>Goliath Dies</p>
        </div>
      </div>

      <div class="video-card"
        onclick="playVideo('Travis Greene','Love Will Always Win','Videos/LOVE WILL ALWAYS WIN.mp4')">
        <video src="Videos/LOVE WILL ALWAYS WIN.mp4"></video>
        <div class="video-info">
          <h4>Travis Greene</h4>
          <p>Love Wins</p>
        </div>
      </div>

      <div class="video-card"
        onclick="playVideo('ADC Music','Yesu Nimfumu','Videos/ADC_YESU_NIFUMU.mp4')">
        <video src="Videos/ADC_YESU_NIFUMU.mp4"></video>
        <div class="video-info">
          <h4>ADC Music</h4>
          <p>Yesu Nimfumu</p>
        </div>
      </div>

    </div>

  </div>
</div>

<script>
// PLAY VIDEO
function playVideo(title, desc, src){
  document.getElementById("title").innerText = title;
  document.getElementById("desc").innerText = desc;

  let video = document.getElementById("mainVideo");
  let source = document.getElementById("videoSource");

  source.src = src;
  video.load();
  video.play();
}

// SEARCH
function searchVideos(){
  let input = document.getElementById("search").value.toLowerCase();
  let cards = document.querySelectorAll(".video-card");

  cards.forEach(card=>{
    let text = card.innerText.toLowerCase();
    card.style.display = text.includes(input) ? "block" : "none";
  });
}
</script>

</body>
</html>
