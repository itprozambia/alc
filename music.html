<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALC Music Library</title>

<style>
:root {
  --primary: #0d1b2a;
  --accent: #e63946;
  --light: #f1f1f1;
}

/* RESET */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--light);
}

/* HEADER */
header {
  background: var(--primary);
  color: white;
  padding: 15px;
  position: sticky;
  top: 0;
}

.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.menu {
  display: flex;
  gap: 15px;
}

.menu a {
  color: white;
  text-decoration: none;
}

.menu-toggle {
  display: none;
  cursor: pointer;
}

/* MOBILE MENU */
@media(max-width:768px){
  .menu {
    position: absolute;
    top: 60px;
    left: 0;
    width: 100%;
    background: var(--primary);
    flex-direction: column;
    display: none;
    text-align: center;
  }

  .menu.active {
    display: flex;
  }

  .menu-toggle {
    display: block;
  }
}

/* HERO */
.hero {
  text-align: center;
  padding: 30px;
  background: white;
}

/* SEARCH */
.search-box {
  padding: 10px;
  text-align: center;
}

.search-box input {
  width: 90%;
  max-width: 400px;
  padding: 10px;
}

/* LAYOUT */
.music-layout {
  display: flex;
  gap: 20px;
  padding: 20px;
}

/* PLAYER */
.player {
  flex: 2;
  background: white;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

audio {
  width: 100%;
  margin-top: 10px;
}

.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 10px 20px;
  background: var(--accent);
  color: white;
  text-decoration: none;
  border-radius: 5px;
}

/* SIDEBAR */
.sidebar {
  flex: 1;
  background: white;
  padding: 10px;
  border-radius: 10px;
  max-height: 400px;
  overflow-y: auto;
}

.song-item {
  padding: 10px;
  cursor: pointer;
  border-bottom: 1px solid #ddd;
}

.song-item:hover {
  background: #eee;
}

.song-item.active {
  background: var(--accent);
  color: white;
}

/* MOBILE */
@media(max-width:768px){
  .music-layout {
    flex-direction: column;
  }
}

/* FOOTER */
footer {
  background: var(--primary);
  color: white;
  text-align: center;
  padding: 15px;
}
</style>
</head>

<body>

<header>
  <div class="nav">
    <div>ALC Music</div>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <div class="menu" id="menu">
      <a href="#">Home</a>
      <a href="#">Sermons</a>
      <a href="#">Contact</a>
    </div>
  </div>
</header>

<section class="hero">
  <h1>Music Library</h1>
  <p>Experience powerful spirit-filled music</p>
</section>

<div class="search-box">
  <input type="text" id="search" placeholder="Search songs..." onkeyup="searchSongs()">
</div>

<div class="music-layout">

  <!-- PLAYER -->
  <div class="player">
    <h2 id="title">Select a song</h2>
    <p id="artist">---</p>

    <audio id="audio" controls></audio>

    <a id="downloadBtn" class="btn">Download</a>
  </div>

  <!-- SONG LIST -->
  <div class="sidebar" id="songList"></div>

</div>

<footer>
  © 2026 Ambiance of Life Church
</footer>

<script>

// SONG DATA (clean & scalable)
const songs = [
  {title:"You are God", artist:"Nathaniel Bassey", src:"music/Godalbyyourself.mp3"},
  {title:"I call it forth", artist:"Deola Rae", src:"music/i call it forth.mp3"},
  {title:"This Year", artist:"Victory Orenze", src:"music/Victoria_Orenze_-_This_Year.mp3"},
  {title:"I Speak Blessing", artist:"Delana Hope", src:"music/i speak blessings.mp3"},
  {title:"Teach Me How To Love", artist:"Delana Hope", src:"music/Delana Hope_Teach_me_how_to_Love.mp3"},
  {title:"You Dey See Me", artist:"Herald Music Group", src:"music/you_DEY_see_me.mp3"},
  {title:"No Longer Slave", artist:"David & Melissa", src:"music/nolongerslave.mp3"},
  {title:"Lesa Sumbulweni", artist:"Reuben Katiyo", src:"music/ReubenSumbulweni.mp3"},
  {title:"Love Will Always Win", artist:"Travis Greene", src:"music/LOVEWINS.mp3"},
  {title:"Kantashe", artist:"Roberta", src:"music/Kantashe.mp3"}
];

// LOAD SONG LIST
const songList = document.getElementById("songList");

songs.forEach((song, index)=>{
  let div = document.createElement("div");
  div.className = "song-item";
  div.innerText = song.artist + " - " + song.title;

  div.onclick = () => playSong(index, div);

  songList.appendChild(div);
});

// PLAY SONG
function playSong(index, element){
  let song = songs[index];

  document.getElementById("title").innerText = song.title;
  document.getElementById("artist").innerText = song.artist;

  let audio = document.getElementById("audio");
  audio.src = song.src;
  audio.play();

  // DOWNLOAD
  let downloadBtn = document.getElementById("downloadBtn");
  downloadBtn.href = song.src;
  downloadBtn.setAttribute("download", song.title + ".mp3");

  // ACTIVE
  document.querySelectorAll(".song-item").forEach(item=>{
    item.classList.remove("active");
  });

  element.classList.add("active");
}

// SEARCH
function searchSongs(){
  let input = document.getElementById("search").value.toLowerCase();
  let items = document.querySelectorAll(".song-item");

  items.forEach(item=>{
    item.style.display = item.innerText.toLowerCase().includes(input) ? "block" : "none";
  });
}

// MENU
function toggleMenu(){
  document.getElementById("menu").classList.toggle("active");
}

</script>

</body>
</html>
